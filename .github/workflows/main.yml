name: Smart Parking CI Pipeline

# Bu pipeline, 'main' dalına her kod gönderildiğinde otomatik çalışır
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Eğer requirements.txt varsa gerekli kütüphaneleri kur
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Check Python Code Syntax (Linting)
      run: |
        pip install flake8
        # Kodda kritik bir sözdizimi hatası (syntax error) var mı diye kontrol et
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Verify Core Files Exist
      run: |
        echo "Checking if essential files are present..."
        test -f app.py || (echo "app.py is missing!" && exit 1)
        test -f main.py || (echo "main.py is missing!" && exit 1)
        echo "All essential files found. Pipeline successful!"